<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EGRU Circulars</title>

<style>
body { font-family: Arial; background:#f5f5f5; padding:20px; }
.container { max-width:900px; margin:auto; }

.banner { text-align:center; margin-bottom:20px; }
.banner img { max-height:200px; }

h1 { text-align:center; color:#002d72; }

.year {
  background:#002d72;
  margin-bottom:10px;
  border-radius:8px;
  overflow:hidden;
}

.year-header {
  background:#fff;
  color:#002d72;
  padding:12px;
  cursor:pointer;
  font-weight:bold;
  text-align:center;
}

.issues {
  color:#222
  display:none;
  padding:10px 20px;
}

.issue { padding:6px 0; }

a { color:#fff; text-decoration:none; }
</style>
</head>

<body>
<div class="container">

<div class="banner">
  <img src="logo.png">
</div>

<h1>EGRU Circulars</h1>

<div id="content">Loading...</div>

</div>

<script>
const repo = "witsgeosciences/EGRU-Circulars";

async function load() {
  const content = document.getElementById("content");

  try {
    const res = await fetch(
      "https://api.github.com/repos/witsgeosciences/EGRU-Circulars/git/trees/main?recursive=1"
    );

    const data = await res.json();

    content.innerHTML = "";

    const folders = {};

    data.tree.forEach(item => {
      if (!item.path.endsWith(".pdf")) return;

      const parts = item.path.split("/");
      if (parts.length < 2) return;

      const year = parts[0];
      const file = parts[1];

      if (!folders[year]) folders[year] = [];
      folders[year].push(file);
    });

    Object.keys(folders)
      .sort((a, b) => Number(b) - Number(a))
      .forEach(year => {

      const yearDiv = document.createElement("div");
      yearDiv.className = "year";

      const header = document.createElement("div");
      header.className = "year-header";
      header.textContent = year;

      const issuesDiv = document.createElement("div");
      issuesDiv.className = "issues";

      header.onclick = () => {
        issuesDiv.style.display =
          issuesDiv.style.display === "block" ? "none" : "block";
      };

      folders[year].forEach(file => {
        const div = document.createElement("div");
        div.className = "issue";

        div.innerHTML = `
          <a href="https://raw.githubusercontent.com/witsgeosciences/EGRU-Circulars/main/${year}/${file}" target="_blank">
            ${file}
          </a>
        `;

        issuesDiv.appendChild(div);
      });

      yearDiv.appendChild(header);
      yearDiv.appendChild(issuesDiv);
      content.appendChild(yearDiv);
    });

  } catch (e) {
    content.innerHTML = "Failed to load folders.";
    console.error(e);
  }
}

load();
</script>

</body>
</html>
