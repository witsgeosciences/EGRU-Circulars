<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EGRU Circulars</title>

<style>
body { font-family: Arial; background:#f5f5f5; padding:20px; }
.container { max-width:900px; margin:auto; }
input { width:100%; padding:12px; margin-bottom:20px; }

.year { background:white; margin-bottom:10px; border-radius:8px; }
.year-header { padding:15px; background:#222; color:white; cursor:pointer; }
.issues { display:none; padding:10px 20px; }
.issue { padding:6px 0; }
</style>
</head>

<body>
<div class="container">

<h1>EGRU Circulars</h1>
<input type="text" id="search" placeholder="Search year or issue number...">

<div id="content"></div>

</div>

<script>
const repo = "YOUR-USERNAME/YOUR-REPO";

async function getFiles() {
  const res = await fetch(`https://api.github.com/repos/${repo}/contents`);
  const folders = await res.json();

  const data = {};

  for (const folder of folders) {
    if (folder.type !== "dir") continue;

    const year = folder.name;
    const res2 = await fetch(folder.url);
    const files = await res2.json();

    data[year] = files
      .filter(f => f.name.endsWith(".pdf"))
      .map(f => {
        const match = f.name.match(/(\d+)/);
        return {
          issue: match ? match[0] : "",
          name: f.name,
          path: f.download_url
        };
      });
  }

  return data;
}

function render(data, filter = "") {
  const content = document.getElementById("content");
  content.innerHTML = "";

  Object.keys(data).sort((a,b)=>b-a).forEach(year => {

    const filtered = data[year].filter(item =>
      year.includes(filter) || item.issue.includes(filter)
    );

    if (!filtered.length) return;

    const yearDiv = document.createElement("div");
    yearDiv.className = "year";

    const header = document.createElement("div");
    header.className = "year-header";
    header.textContent = year;

    const issuesDiv = document.createElement("div");
    issuesDiv.className = "issues";

    filtered.forEach(item => {
      const div = document.createElement("div");
      div.className = "issue";
      div.innerHTML = `<a href="${item.path}" target="_blank">${item.name}</a>`;
      issuesDiv.appendChild(div);
    });

    header.onclick = () => {
      issuesDiv.style.display =
        issuesDiv.style.display === "block" ? "none" : "block";
    };

    yearDiv.appendChild(header);
    yearDiv.appendChild(issuesDiv);
    content.appendChild(yearDiv);
  });
}

(async () => {
  const data = await getFiles();

  document.getElementById("search").addEventListener("input", e => {
    render(data, e.target.value.trim());
  });

  render(data);
})();
</script>

</body>
</html>
